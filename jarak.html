<!DOCTYPE html>
<html>
<head>
  <title>Trilateration App 1 - Coordinates to Times</title>
</head>
<body>

<h3>App 1: Coordinates to Signal Times</h3>

<p>This app uses normalized coordinates from 0 to 100.</p>

<p>
  x0: <input id="x0" type="number" value="40">
  y0: <input id="y0" type="number" value="50">
  <button onclick="compute()">Compute Signal Times</button>
</p>

<p id="output"></p>

<canvas
  id="canvas"
  style="border:1px solid black; width:min(95vw, 75vh); height:min(95vw, 75vh);">
</canvas>

<script>
// Logical coordinate system
const X_MIN = 0;
const X_MAX = 100;
const Y_MIN = 0;
const Y_MAX = 100;

// Signal speed
// For now, C = 1 means 1 coordinate unit per 1 time unit.
const C = 1;

// Satellite positions in logical coordinates
const sats = [
  {x: 20, y: 80, color: "red"},
  {x: 80, y: 75, color: "green"},
  {x: 50, y: 20, color: "blue"}
];

function resizeCanvas() {
  const canvas = document.getElementById("canvas");
  const rect = canvas.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = rect.height;
}

function toCanvasX(x) {
  const canvas = document.getElementById("canvas");
  return (x - X_MIN) / (X_MAX - X_MIN) * canvas.width;
}

function toCanvasY(y) {
  const canvas = document.getElementById("canvas");

  // Flip y because canvas y-axis points downward
  return canvas.height - (y - Y_MIN) / (Y_MAX - Y_MIN) * canvas.height;
}

function toCanvasDistance(r) {
  const canvas = document.getElementById("canvas");
  return r / (X_MAX - X_MIN) * canvas.width;
}

function distance(x0, y0, x1, y1) {
  return Math.sqrt((x0 - x1)**2 + (y0 - y1)**2);
}

function distanceToTime(r) {
  return r / C;
}

function timeToDistance(t) {
  return C * t;
}

function drawCross(ctx, x, y, color) {
  const cx = toCanvasX(x);
  const cy = toCanvasY(y);

  ctx.strokeStyle = color;
  ctx.beginPath();

  ctx.moveTo(cx - 6, cy);
  ctx.lineTo(cx + 6, cy);

  ctx.moveTo(cx, cy - 6);
  ctx.lineTo(cx, cy + 6);

  ctx.stroke();
}

function compute() {
  resizeCanvas();

  const x0 = parseFloat(document.getElementById("x0").value);
  const y0 = parseFloat(document.getElementById("y0").value);

  const r = [];
  const t = [];

  for (let i = 0; i < 3; i++) {
    r[i] = distance(x0, y0, sats[i].x, sats[i].y);
    t[i] = distanceToTime(r[i]);
  }

  document.getElementById("output").innerText =
    `t1 = ${t[0].toFixed(2)}, t2 = ${t[1].toFixed(2)}, t3 = ${t[2].toFixed(2)}`;

  drawScene(x0, y0, t);
}

function drawScene(x0, y0, t) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 3; i++) {
    drawCross(ctx, sats[i].x, sats[i].y, sats[i].color);

    // Convert time back to distance for drawing the circle
    const r = timeToDistance(t[i]);

    const cx = toCanvasX(sats[i].x);
    const cy = toCanvasY(sats[i].y);
    const cr = toCanvasDistance(r);

    ctx.strokeStyle = sats[i].color;
    ctx.beginPath();
    ctx.arc(cx, cy, cr, 0, 2 * Math.PI);
    ctx.stroke();
  }

  drawCross(ctx, x0, y0, "black");
}

window.onload = compute;
window.onresize = compute;
</script>

</body>
</html>
