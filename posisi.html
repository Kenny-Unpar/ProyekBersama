<!DOCTYPE html>
<html>
<head>
  <title>Jarak → Posisi</title>
</head>
<body>

<h3>Masukkan Jarak</h3>
r1: <input id="r1" type="number">
r2: <input id="r2" type="number">
r3: <input id="r3" type="number">
<button onclick="solve()">Tentukan Posisi</button>

<p id="output"></p>

<canvas id="canvas" width="400" height="400" style="border:1px solid black;"></canvas>

<script>
// same satellites
const s1 = {x: 50, y: 50};
const s2 = {x: 300, y: 80};
const s3 = {x: 200, y: 300};

function drawCross(ctx, x, y, color) {
  ctx.strokeStyle = color;
  ctx.beginPath();
  ctx.moveTo(x-5, y);
  ctx.lineTo(x+5, y);
  ctx.moveTo(x, y-5);
  ctx.lineTo(x, y+5);
  ctx.stroke();
}

function solve() {
  let r1 = parseFloat(document.getElementById("r1").value);
  let r2 = parseFloat(document.getElementById("r2").value);
  let r3 = parseFloat(document.getElementById("r3").value);

  // linear equations
  let A = 2*(s2.x - s1.x);
  let B = 2*(s2.y - s1.y);
  let C = r1*r1 - r2*r2 - s1.x*s1.x + s2.x*s2.x - s1.y*s1.y + s2.y*s2.y;

  let D = 2*(s3.x - s1.x);
  let E = 2*(s3.y - s1.y);
  let F = r1*r1 - r3*r3 - s1.x*s1.x + s3.x*s3.x - s1.y*s1.y + s3.y*s3.y;

  // solve 2x2 system
  let denom = A*E - B*D;

  if (denom === 0) {
    document.getElementById("output").innerText = "No unique solution";
    return;
  }

  let x = (C*E - B*F) / denom;
  let y = (A*F - C*D) / denom;

  document.getElementById("output").innerText =
    `x0=${x.toFixed(2)}, y0=${y.toFixed(2)}`;

  drawScene(x, y, r1, r2, r3);
}

function drawScene(x0, y0, r1, r2, r3) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, 400, 400);

  let sats = [
    { ...s1, color: "red", r: r1 },
    { ...s2, color: "green", r: r2 },
    { ...s3, color: "blue", r: r3 }
  ];

  for (let s of sats) {
    drawCross(ctx, s.x, s.y, s.color);

    ctx.strokeStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, 2*Math.PI);
    ctx.stroke();
  }

  drawCross(ctx, x0, y0, "black");
}
</script>

</body>
</html>
