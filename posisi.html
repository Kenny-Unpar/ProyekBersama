<!DOCTYPE html>
<html>
<head>
  <title>Trilateration App 2 - Distances to Coordinates</title>
</head>
<body>

<h3>App 2: Distances to Coordinates</h3>

<p>This app uses normalized coordinates from 0 to 100.</p>

<p>
  r1: <input id="r1" type="number" value="36.06">
  r2: <input id="r2" type="number" value="40.31">
  r3: <input id="r3" type="number" value="31.62">
  <button onclick="solve()">Solve Position</button>
</p>

<p id="output"></p>

<canvas
  id="canvas"
  style="border:1px solid black; width:min(90vw, 60vh); height:min(90vw, 60vh);">
</canvas>

<script>
// Logical coordinate system
const X_MIN = 0;
const X_MAX = 100;
const Y_MIN = 0;
const Y_MAX = 100;

// Same satellite positions as App 1
const s1 = {x: 20, y: 80, color: "red"};
const s2 = {x: 80, y: 75, color: "green"};
const s3 = {x: 50, y: 20, color: "blue"};

function resizeCanvas() {
  const canvas = document.getElementById("canvas");

  // Get the actual displayed size from CSS
  const rect = canvas.getBoundingClientRect();

  // Set the internal drawing size to match the displayed size
  canvas.width = rect.width;
  canvas.height = rect.height;
}

function toCanvasX(x) {
  const canvas = document.getElementById("canvas");

  return (x - X_MIN) / (X_MAX - X_MIN) * canvas.width;
}

function toCanvasY(y) {
  const canvas = document.getElementById("canvas");

  // Flip y because canvas y-axis points downward
  return canvas.height - (y - Y_MIN) / (Y_MAX - Y_MIN) * canvas.height;
}

function toCanvasDistance(r) {
  const canvas = document.getElementById("canvas");

  // Because the logical area is square and the canvas is square,
  // one scale is enough for distance.
  return r / (X_MAX - X_MIN) * canvas.width;
}

function drawCross(ctx, x, y, color) {
  const cx = toCanvasX(x);
  const cy = toCanvasY(y);

  ctx.strokeStyle = color;
  ctx.beginPath();

  // Horizontal line
  ctx.moveTo(cx - 6, cy);
  ctx.lineTo(cx + 6, cy);

  // Vertical line
  ctx.moveTo(cx, cy - 6);
  ctx.lineTo(cx, cy + 6);

  ctx.stroke();
}

function solve() {
  resizeCanvas();

  const r1 = parseFloat(document.getElementById("r1").value);
  const r2 = parseFloat(document.getElementById("r2").value);
  const r3 = parseFloat(document.getElementById("r3").value);

  // First linear equation:
  // A x + B y = C
  const A = 2 * (s2.x - s1.x);
  const B = 2 * (s2.y - s1.y);
  const C =
    r1*r1 - r2*r2
    - s1.x*s1.x + s2.x*s2.x
    - s1.y*s1.y + s2.y*s2.y;

  // Second linear equation:
  // D x + E y = F
  const D = 2 * (s3.x - s1.x);
  const E = 2 * (s3.y - s1.y);
  const F =
    r1*r1 - r3*r3
    - s1.x*s1.x + s3.x*s3.x
    - s1.y*s1.y + s3.y*s3.y;

  // Determinant of the 2x2 system
  const denominator = A * E - B * D;

  if (Math.abs(denominator) < 0.000001) {
    document.getElementById("output").innerText =
      "No unique solution. The satellite positions may be problematic.";
    return;
  }

  // Solve using Cramer's rule
  const x0 = (C * E - B * F) / denominator;
  const y0 = (A * F - C * D) / denominator;

  document.getElementById("output").innerText =
    `x0 = ${x0.toFixed(2)}, y0 = ${y0.toFixed(2)}`;

  drawScene(x0, y0, r1, r2, r3);
}

function drawScene(x0, y0, r1, r2, r3) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const sats = [
    {x: s1.x, y: s1.y, color: s1.color, r: r1},
    {x: s2.x, y: s2.y, color: s2.color, r: r2},
    {x: s3.x, y: s3.y, color: s3.color, r: r3}
  ];

  // Draw satellites and circles
  for (let i = 0; i < 3; i++) {
    drawCross(ctx, sats[i].x, sats[i].y, sats[i].color);

    const cx = toCanvasX(sats[i].x);
    const cy = toCanvasY(sats[i].y);
    const cr = toCanvasDistance(sats[i].r);

    ctx.strokeStyle = sats[i].color;
    ctx.beginPath();
    ctx.arc(cx, cy, cr, 0, 2 * Math.PI);
    ctx.stroke();
  }

  // Draw reconstructed object
  drawCross(ctx, x0, y0, "black");
}

// Draw once when the page opens
window.onload = solve;

// Redraw when screen size changes
window.onresize = solve;
</script>

</body>
</html>
